<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casamento Nicolas & Phamyla</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

/* =============================== */
/* CONFIGURAÇÃO BASE */
/* =============================== */

:root{
  --azul:#0d1b2a;
  --papel:#f5f5f5;
  --sombra:#e0e0e0;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Montserrat',sans-serif;
  background:var(--azul);
  overflow-x:hidden;
}

/* =============================== */
/* ÁREA DE ANIMAÇÃO */
/* =============================== */

.envelope-section{
  height:calc(var(--vh) * 250);
  position:relative;
}

.sticky{
  position:sticky;
  top:0;
  height:calc(var(--vh) * 100);
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:1200px;
}

/* =============================== */
/* CARTA */
/* =============================== */

.letter{
  width:320px;
  height:450px;
  background:white;
  position:absolute;
  bottom:5%;
  border-radius:6px;
  padding:30px;
  text-align:center;
  transform:translateY(120px);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
  z-index:2;
  transition:transform 0.1s linear;

  /* melhora performance mobile */
  will-change: transform;
}

/* dobra visual da carta */
.letter::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:40px;
  background:linear-gradient(to bottom, #eaeaea, white);
}

/* =============================== */
/* ENVELOPE BASE */
/* =============================== */

.envelope-back{
  width:360px;
  height:220px;
  background:var(--papel);
  position:absolute;
  bottom:30%;
  border-radius:4px;
  z-index:1;
}

/* =============================== */
/* FRENTE DO ENVELOPE */
/* =============================== */

.envelope-front{
  width:360px;
  height:220px;
  background:var(--sombra);
  position:absolute;
  bottom:30%;
  border-radius:4px;
  clip-path: polygon(30% 30%, 70% 30%, 100% 5%, 100% 100%, 0 100%, 0 5%);
  z-index:3;
}

/* =============================== */
/* ABA SUPERIOR */
/* =============================== */

.envelope-flap{
  width:360px;
  height:220px;
  background:#dcdcdc;
  position:absolute;
  bottom:30%;
  clip-path: polygon(100% 0, 100% 15%, 50% 55%, 0 15%, 0 0);
  transform-origin:top;
  transform:rotateX(0deg);
  z-index:4;
  transition:transform 0.1s linear;

  /* melhora performance */
  will-change: transform;
}

/* =============================== */
/* RESTO DO SITE */
/* =============================== */

.content{
  background:white;
  padding:100px 20px;
  text-align:center;
}

h1{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;
  color:var(--azul);
}

p{
  margin-top:15px;
  font-size:14px;
}

/* =============================== */
/* RESPONSIVO MOBILE */
/* =============================== */

@media (max-width:600px){

.letter{
  width:280px;
  height:400px;
  padding:25px;
}

.envelope-back,
.envelope-front,
.envelope-flap{
  width:320px;
  height:200px;
}

}

</style>
</head>
<body>

<section class="envelope-section">

  <div class="sticky">

    <!-- CARTA -->
    <div class="letter" id="letter">
      <h1>Nicolas & Phamyla</h1>
      <p>“Assim, eles já não são dois, mas uma só carne.”</p>
      <p><strong>Mateus 19:6</strong></p>
      <p>31 de Outubro de 2026</p>
    </div>

    <!-- ENVELOPE -->
    <div class="envelope-back"></div>
    <div class="envelope-front"></div>
    <div class="envelope-flap" id="flap"></div>

  </div>

</section>

<section class="content">
  <h2>Bem-vindos ao nosso casamento</h2>
  <p>Aqui começam os detalhes do grande dia.</p>
</section>

<script>

/* ================================= */
/* CORREÇÃO DE ALTURA REAL MOBILE */
/* ================================= */

function setRealViewportHeight() {
  let vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
}

setRealViewportHeight();

window.addEventListener('resize', setRealViewportHeight);

/* ================================= */
/* ANIMAÇÃO DO ENVELOPE */
/* ================================= */

const flap = document.getElementById("flap");
const letter = document.getElementById("letter");
const section = document.querySelector(".envelope-section");

window.addEventListener("scroll", () => {

  const rect = section.getBoundingClientRect();
  const sectionHeight = section.offsetHeight - window.innerHeight;

  let progress = Math.min(Math.max(-rect.top / sectionHeight,0),1);

  /* ABA DO ENVELOPE */
  flap.style.transform = `rotateX(${-220 * progress}deg)`;

  if (progress > 0.5) {
    flap.style.zIndex = 0;
  } else {
    flap.style.zIndex = 4;
  }

  /* CARTA */
  let letterProgress = Math.max((progress - 0.3) / 0.7, 0);

  letter.style.transform = `translateY(${120 - (letterProgress * 420)}px)`;

});

</script>

</body>
</html>
